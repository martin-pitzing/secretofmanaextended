id: rabite
canon_name: Rabite
biome: forbidden_falls
tier: minor
art_brief: >
  The canon Rabite reframed for Forbidden Falls — small leaping fanged tuft.
  Reads as a hostile river-spirit reflex, not a cute mascot. Slightly
  damp-matted fur, water beading in the side and attack lanes.
style_adaptation: >
  Departs from SoM '93 yellow Rabite. Forbidden Falls Rabites are basalt-grey
  with a single rust accent on the ear-tips and incisors. Eyes are pale
  bioluminescent dots, not dark beads. Silhouette unchanged so the canon
  reference still reads at thumbnail size.
