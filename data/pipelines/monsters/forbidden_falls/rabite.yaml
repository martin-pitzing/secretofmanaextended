id: rabite
canon_name: Rabite
biome: forbidden_falls
tier: minor
art_brief: >
  The canon Rabite reframed for Forbidden Falls — small fanged tuft creature
  with floppy ears, a round bunny-like body, and prominent buck teeth. It is
  the canonical SoM '93 Rabite; only the palette and damp fur readout change.
  Reads as a hostile river-spirit reflex, not a cute mascot.
style_adaptation: >
  Silhouette is fully canon: keep the rounded body, long floppy ears, single
  pair of buck teeth, short stubby legs, and the iconic ear-flop. ONLY the
  palette and surface detail change — Forbidden Falls Rabites are basalt-grey
  with a single rust accent on the ear-tips and incisors, fur slightly
  damp-matted, eyes are pale bioluminescent dots (not dark beads). Do NOT
  alter the body plan; if the result looks like a rat, mouse, dog, or cat,
  it is wrong.
style_anchor: style/forbidden_falls_anchor.yaml
